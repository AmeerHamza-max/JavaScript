<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Shipping Calculator</title>
</head>
<body>
   <p>Amazon Shipping Calculator</p> 
   <input type="text" placeholder="Cost of order" class="js-cost-input">
   <button class="calculate">Calculate</button>
   <p class="js-total-cost"></p>
   <script>
       const inputElement=document.querySelector('.js-cost-input');
    function calculateTotal(){
       // whenever we get a value from the dom the value will be a string we have to convert into a number using type coercion given below
        let cost=Number(inputElement.value);

        if(cost<40){
            cost=cost+10;
        }
        document.querySelector('.js-total-cost').innerHTML=`$${cost}`;


    }
    let calculate=document.querySelector('.calculate');
    calculate.addEventListener('click',calculateTotal);
   inputElement.addEventListener('keydown',(event)=>{
    if(event.key==='Enter'){
        calculateTotal();
    };
   })
   </script>
</body>
</html>
