<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booleans</title>
</head>
<body>
    <script>
// Booleans are another type of value
// there are only 2 booleans values true or false
 // true 
// false 
console.log(3 < 5);
console.log(3 > 5);
console.log(typeof 'true');//this is string
console.log(typeof 'false');//this is string
console.log(true);//this is a boolean
console.log(false);//this is boolean


console.log(5=='5');//true
console.log(5==='5');//false


//  > greater than
//  < less than
// >= greater than or equal to 
// <= less than or equal to 
// === and ==  equal to
// !== and != not equal to


// these  have lower priority than math operators like + - * /


// If-Statements 
// let us write multiple groups of code and then decide which code to run

const age=15;

if(true){//if true then it runs the block of code
    console.log('hello');
}
if(false){
    console.log("This code will not work because braces have false value");
}
else{
    console.log('else part if the first statement not run then else statement runs.');
}



if(30>=16){
    console.log("You can drive");
}
else if(15>=14){
    console.log('Almost there!');
}
else{
    console.log("You cannot drive");
}

if(age>=16){
    console.log("You can drive");
}
else if(age>=14){
    console.log('Almost there!');
}
else{
    console.log("You cannot drive");
}

// Logical Operators 
console.log(true && true);//true
console.log(true && false);//false
if(0.2 >= 0 && 0.2 < 1/3){
    console.log('rock');
};
console.log(true || false);//true
console.log(!true);//false
console.log(!false);//true

    </script>
</body>
</html>
