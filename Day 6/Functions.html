<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions</title>
</head>
<body>
    <script>
//A function lets us reuse code

// first write the function and then write the name of the function 
// name of the function can be anything we can't start function 
// with numbers and can't add special symbols and can't use spaces
// and can't use - dash for this sign 
function function1(){
    //this is called function body
    console.log('hello');
    console.log(2 + 2);
}
function1();//this is know as calling the function or running the function or executing the function 
function1();
function1();

//return gets a value out of a function 
//parameter puts a value into a function 

function calculateTax(cost,taxPercent=0.1){//these are parameters
    console.log(taxPercent);
    console.log(cost * taxPercent);
}
calculateTax(2000,0.2);//these are arguments we are passing
calculateTax(5000);
    </script>
</body>
</html>
