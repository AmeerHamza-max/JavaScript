<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        if(5){
            console.log("Truthy if it runs");
        }
        if(0){
            console.log('falsy value if it does not run');
        }
        const cartQunatity=4;
        if(cartQunatity){
            console.log("Cart has products");
        }
        console.log(!0);//true


        console.log('text'/5);//NaN

        let variable1;
        console.log(variable1);//undefined
//  List of falsy values
//  falsy values =  0   ''   Nan Undefined  null
//  Truthy Values =  5 ' ' 'a'

        // Shorcuts for If-Statements 
        // Ternary Operator ?:
        // Default Operator || 
    // Ternary Operator  
        // true ? 'truthy':'falsy'; this is just like if else statement
        const result=true  ?  'truthy':  'falsy';
        console.log(result);


        // Guard Operator  it works just like and operator but it is in ternary operator
        //value1 && value2 if value1 is false then it is impossible for both side to be truthy.
        // it don't even check the value2 doesn't need to run the code this is called short circuit evaluation
        false && console.log('hello');//it does not print hello because first is false this is called short circuit evaluation

        const message=false && 'hello';//guard operator stop early;
        console.log(message);//false

        const message1=5 && 'hello';
        console.log(message1);//it print hello because first is true


        // Default Operator || just like or operator

        // true || value2; we already know the result will be true 
        // stops early because of short circuits and did not run the value2

        const currency='EUR'||'USD';
        console.log(currency);
        const currency1=undefined || 'USD';
        console.log(currency1);

    </script>
</body>
</html>
