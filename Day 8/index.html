   <script>
    const score=JSON.parse(localStorage.getItem("score"))||{
            wins:0,
            losses:0,
            ties:0,
         };;
      if(score===null){
         score={
            wins:0,
            losses:0,
            ties:0,
         };
      }                                                                                                             
      function playGame(playerMove) {
         const computerMove = pickComputerMove();
         let result = '';
         if(playerMove==="paper"){
            if (computerMove === 'rock') {
            result = 'You win.'
         } else if (computerMove === 'paper') {
            result = 'Tie.';
         }
         else if (computerMove === 'scissors') {
            result = 'You lose.';
         }
      }
         else if(playerMove==="rock"){
            if (computerMove === 'rock') {
            result = 'Tie.'
         } else if (computerMove === 'paper') {
            result = 'You lose.';
         }
         else if (computerMove === 'scissors') {
            result = 'You win.';
         }
         }
         else if(playerMove==="scissors"){
            if (computerMove === 'rock') {

         } else if (computerMove === 'paper') {
            result = 'You win.';
         }
         else if (computerMove === 'scissors') {
            result = 'Tie.';
         }
         }
         if(result==='You win.'){
            score.wins=score.wins+1;
 
         }
         else if(result==='You lose.'){
            score.losses+=1;
         }
         else if(result==='Tie.'){
            score.ties+=1;
         }
         localStorage.setItem('message','hello');//this will be stored in browser in javascrit 
         localStorage.setItem('score',JSON.stringify(score));
         
         
         alert(`You picked ${playerMove}. Computer picked ${computerMove}.${result} \n Wins: ${score.wins}, Looses: ${score.losses}, Ties: ${score.ties}`);
      }
   
      function pickComputerMove() {
         const randomNumber = Math.random()
         let computerMove = '';
         if (randomNumber >= 0 && randomNumber < 1 / 3) {
            computerMove = 'rock';
         }
         else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
            computerMove = 'paper';
         }
         else if (randomNumber >= 2 / 3 && randomNumber < 1) {
            computerMove = 'scissors';
         }
         return computerMove;
